<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Formulario de registro con diseño moderno">
  <title>Formulario de Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      overflow: hidden;
      position: relative;
    }

    /* ===== Animated Background Orbs ===== */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      z-index: 0;
      animation: float 8s ease-in-out infinite alternate;
    }

    body::before {
      width: 500px;
      height: 500px;
      background: #7f5af0;
      top: -150px;
      left: -100px;
    }

    body::after {
      width: 400px;
      height: 400px;
      background: #2cb67d;
      bottom: -120px;
      right: -80px;
      animation-delay: 2s;
    }

    @keyframes float {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.1); }
    }

    /* ===== Glass Card ===== */
    .form-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      margin: 20px;
      padding: 48px 40px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== Header ===== */
    .form-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .form-header .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #7f5af0, #2cb67d);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 4px 20px rgba(127, 90, 240, 0.35);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(127, 90, 240, 0.35); }
      50%      { box-shadow: 0 4px 30px rgba(127, 90, 240, 0.55); }
    }

    .form-header h1 {
      color: #fffffe;
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .form-header p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
      margin-top: 6px;
      font-weight: 300;
    }

    /* ===== Form Groups ===== */
    .form-group {
      margin-bottom: 22px;
      position: relative;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeField 0.5s ease forwards;
    }

    .form-group:nth-child(1) { animation-delay: 0.15s; }
    .form-group:nth-child(2) { animation-delay: 0.25s; }
    .form-group:nth-child(3) { animation-delay: 0.35s; }
    .form-group:nth-child(4) { animation-delay: 0.45s; }
    .form-group:nth-child(5) { animation-delay: 0.55s; }

    @keyframes fadeField {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-group label {
      display: block;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      transition: color 0.3s;
    }

    .form-group:focus-within label {
      color: #7f5af0;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .input-icon {
      position: absolute;
      top: 50%;
      left: 16px;
      transform: translateY(-50%);
      font-size: 1.1rem;
      opacity: 0.5;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .form-group:focus-within .input-icon {
      opacity: 1;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: #fffffe;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.35s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: #7f5af0;
      background: rgba(127, 90, 240, 0.08);
      box-shadow: 0 0 0 3px rgba(127, 90, 240, 0.15);
    }

    .form-group select {
      cursor: pointer;
    }

    .form-group select option {
      background: #24243e;
      color: #fffffe;
    }

    /* ===== Custom Select Arrow ===== */
    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 1rem;
      pointer-events: none;
    }

    /* ===== Submit Button ===== */
    .btn-submit {
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      background: linear-gradient(135deg, #7f5af0, #6c47d9);
      color: #fffffe;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.35s ease;
      letter-spacing: 0.3px;
      opacity: 0;
      animation: fadeField 0.5s ease 0.65s forwards;
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(127, 90, 240, 0.45);
    }

    .btn-submit:hover::before {
      transform: translateX(100%);
    }

    .btn-submit:active {
      transform: translateY(0);
      box-shadow: 0 4px 15px rgba(127, 90, 240, 0.3);
    }

    /* ===== Footer Text ===== */
    .form-footer {
      text-align: center;
      margin-top: 24px;
      color: rgba(255, 255, 255, 0.35);
      font-size: 0.78rem;
      opacity: 0;
      animation: fadeField 0.5s ease 0.75s forwards;
    }

    .form-footer a {
      color: #7f5af0;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }

    .form-footer a:hover {
      color: #9d80f7;
    }

    /* ===== Success Animation ===== */
    .success-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15, 12, 41, 0.95);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 10;
    }

    .success-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .success-overlay .checkmark {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2cb67d, #1a9d6a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 16px;
      transform: scale(0);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.15s;
    }

    .success-overlay.visible .checkmark {
      transform: scale(1);
    }

    .success-overlay h2 {
      color: #fffffe;
      font-size: 1.3rem;
      font-weight: 600;
    }

    .success-overlay p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
      margin-top: 6px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 520px) {
      .form-card {
        padding: 36px 24px;
        border-radius: 20px;
      }

      .form-header h1 {
        font-size: 1.4rem;
      }

      .form-group input,
      .form-group select {
        padding: 12px 12px 12px 44px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <div class="form-card">
    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
      <div class="checkmark">✓</div>
      <h2>¡Registro Exitoso!</h2>
      <p>Tu información ha sido enviada correctamente.</p>
    </div>

    <!-- Header -->
    <div class="form-header">
      <div class="icon">📋</div>
      <h1>Formulario de Registro</h1>
      <p>Completa los campos para continuar</p>
    </div>

    <!-- Form -->
    <form id="registroForm" novalidate>

      <!-- 1. Nombre completo -->
      <div class="form-group">
        <label for="nombre">Nombre completo</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez García" required>
        </div>
      </div>

      <!-- 2. Correo electrónico -->
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
        </div>
      </div>

      <!-- 3. Teléfono -->
      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <div class="input-wrapper">
          <span class="input-icon">📱</span>
          <input type="tel" id="telefono" name="telefono" placeholder="(55) 1234-5678" required>
        </div>
      </div>

      <!-- 4. Fecha de nacimiento -->
      <div class="form-group">
        <label for="fechaNacimiento">Fecha de nacimiento</label>
        <div class="input-wrapper">
          <span class="input-icon">📅</span>
          <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
        </div>
      </div>

      <!-- 5. Ciudad -->
      <div class="form-group">
        <label for="ciudad">Ciudad</label>
        <div class="input-wrapper select-wrapper">
          <span class="input-icon">📍</span>
          <select id="ciudad" name="ciudad" required>
            <option value="" disabled selected>Selecciona tu ciudad</option>
            <option value="cdmx">Ciudad de México</option>
            <option value="guadalajara">Guadalajara</option>
            <option value="monterrey">Monterrey</option>
            <option value="puebla">Puebla</option>
            <option value="cancun">Cancún</option>
            <option value="merida">Mérida</option>
            <option value="otra">Otra</option>
          </select>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-submit" id="btnSubmit">Enviar Registro</button>
    </form>

    <p class="form-footer">¿Ya tienes cuenta? <a href="#">Inicia sesión</a></p>
  </div>

  <script>
    const form = document.getElementById('registroForm');
    const overlay = document.getElementById('successOverlay');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      // Basic validation
      const fields = form.querySelectorAll('input, select');
      let valid = true;

      fields.forEach(field => {
        if (!field.value || (field.tagName === 'SELECT' && field.value === '')) {
          field.style.borderColor = '#e53170';
          field.style.boxShadow = '0 0 0 3px rgba(229, 49, 112, 0.15)';
          valid = false;

          // Reset style on focus
          field.addEventListener('focus', function handler() {
            field.style.borderColor = '';
            field.style.boxShadow = '';
            field.removeEventListener('focus', handler);
          });
        }
      });

      if (valid) {
        overlay.classList.add('visible');

        // Reset after 3 seconds
        setTimeout(() => {
          overlay.classList.remove('visible');
          form.reset();
        }, 3000);
      }
    });
  </script>

</body>
</html>
